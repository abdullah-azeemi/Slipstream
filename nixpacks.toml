[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
    "curl -LsSf https://astral.sh/uv/install.sh | sh",
    "export PATH=\"$HOME/.local/bin:$PATH\"",
    "uv sync --all-packages --no-dev"
]

[start]
cmd = "uv run flask --app apps/backend/src/backend run --host 0.0.0.0 --port $PORT"
