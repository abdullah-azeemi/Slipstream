[project]
name = "slipstream-stream"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "quixstreams>=2.6",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stream"]
