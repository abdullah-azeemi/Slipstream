
[project]

name = "ml"

version = "0.1.0"

requires-python = ">=3.11"

dependencies = [

    "flaml[automl]>=2.1.0",

    "scikit-learn>=1.4.0",

    "xgboost>=2.0.0",

    "lightgbm>=4.0.0",

    "pandas>=2.0.0",

    "numpy>=1.26.0",

    "sqlalchemy>=2.0.0",

    "psycopg[binary]>=3.1.0",

    "pydantic-settings>=2.0.0",

    "mlflow>=2.10.0",

    "structlog>=24.0.0",

]

[project.optional-dependencies]
explain = [
    "shap>=0.44.0",
]

[build-system]

requires = ["hatchling"]

build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]

packages = ["src/ml"]
