[project]
name = "slipstream-ingestion"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastf1>=3.3",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "kafka-python-ng>=2.2",
    "structlog>=24.0",
    "tenacity>=8.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingestion"]
