[project]
name = "workers"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "celery[redis]>=5.3",
    "structlog>=24.0",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.1",
    "pydantic-settings>=2.0",
    "fastf1>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workers"]
