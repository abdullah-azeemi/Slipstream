name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: pitwall
          POSTGRES_PASSWORD: pitwall
          POSTGRES_DB: pitwall
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://pitwall:pitwall@localhost:5432/pitwall
      REDIS_URL: redis://localhost:6379/0
      FLASK_ENV: testing
      FASTF1_CACHE_DIR: /tmp/fastf1_cache

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Init database schema
        run: |
          uv run python -c "
          from sqlalchemy import create_engine, text
          import os, time
          url = os.environ['DATABASE_URL']
          # Wait for TimescaleDB to be ready
          for i in range(10):
              try:
                  engine = create_engine(url)
                  with engine.connect() as conn:
                      conn.execute(text('SELECT 1'))
                  break
              except Exception:
                  time.sleep(2)
          "
          # Run init SQL
          PGPASSWORD=pitwall psql -h localhost -U pitwall -d pitwall -f infra/postgres/init.sql

      - name: Run backend tests
        run: uv run pytest apps/backend/tests/ -v --tb=short

      - name: Lint with ruff
        run: uv run ruff check apps/backend/src/ packages/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install dependencies
        run: cd apps/frontend && pnpm install

      - name: Type check
        run: cd apps/frontend && pnpm tsc --noEmit

      - name: Build
        run: cd apps/frontend && pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
